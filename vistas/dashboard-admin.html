<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sport-purple: #6f42c1; --sport-yellow: #ffc107; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; }
        .bg-purple { background-color: var(--sport-purple) !important; }
        .nav-logo { max-height: 45px; }
        .card-profile { border: none; border-radius: 15px; background: linear-gradient(135deg, #6f42c1 0%, #4e2ea1 100%); color: white; }
        .card-table { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-purple { background-color: var(--sport-purple); color: white; border: none; }
        .btn-purple:hover { background-color: #5a32a3; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-purple shadow mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <img src="../assets/logoSportClub.png" alt="Logo SportClub" class="nav-logo me-2" onerror="this.src='https://via.placeholder.com/45'">
                <span class="fw-bold">ADMIN <span class="text-warning">PORTAL</span></span>
            </a>
            <button class="btn btn-sm btn-outline-light fw-bold" onclick="logout()">CERRAR SESIÓN</button>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="statusAlert" class="alert d-none shadow-sm fw-bold mb-4"></div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card card-profile p-4 mb-4 shadow text-center">
                    <div class="mb-3"><span style="font-size: 3rem;">🛡️</span></div>
                    <h4 id="adminDisplayName" class="fw-bold mb-1">Cargando...</h4>
                    <p class="badge bg-warning text-dark mb-3" id="adminDisplayRole">ADMINISTRADOR</p>
                    <div class="text-start small border-top pt-3">
                        <p class="mb-1"><strong>Sede:</strong> <span id="adminDisplayCampus">---</span></p>
                        <p class="mb-0"><strong>Cargo:</strong> <span id="adminDisplayPosition">---</span></p>
                    </div>
                </div>

                <div class="card card-table p-4 border-0">
                    <h6 class="fw-bold mb-3">⚙️ MIS AJUSTES PERSONALES</h6>
                    <form id="editSelfForm">
                        <div class="mb-2">
                            <label class="x-small fw-bold">MI NOMBRE</label>
                            <input type="text" id="selfName" class="form-control form-control-sm" required>
                        </div>
                        <div class="mb-3">
                            <label class="x-small fw-bold">NUEVA CLAVE</label>
                            <input type="password" id="selfPass" class="form-control form-control-sm" placeholder="Opcional">
                        </div>
                        <button type="submit" class="btn btn-purple btn-sm w-100 fw-bold">ACTUALIZAR MI PERFIL</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card card-table overflow-hidden">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold">LISTADO DE USUARIOS</h5>
                        <button class="btn btn-success btn-sm fw-bold" onclick="openUserModal()">+ CREAR NUEVO</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Usuario</th>
                                        <th>Rol</th>
                                        <th>Info Extra</th>
                                        <th class="text-center pe-4">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0">
                <div class="modal-header bg-purple text-white">
                    <h5 class="modal-title fw-bold" id="mTitle">Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="adminUserForm">
                    <div class="modal-body">
                        <input type="hidden" id="mUserId">
                        <div class="mb-3">
                            <label class="small fw-bold">NOMBRE</label>
                            <input type="text" id="mName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">EMAIL</label>
                            <input type="email" id="mEmail" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">ROL</label>
                            <select id="mRole" class="form-select">
                                <option value="user">Socio</option>
                                <option value="coach">Coach</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                        <div id="mPassArea" class="mb-3">
                            <label class="small fw-bold">CONTRASEÑA</label>
                            <input type="password" id="mPass" class="form-control">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-purple w-100 fw-bold">GUARDAR EN BASE DE DATOS</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>

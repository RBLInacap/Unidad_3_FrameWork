<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sport-purple: #6f42c1;
            --sport-yellow: #ffc107;
            --sport-dark: #212529;
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card-register {
            border: none;
            border-top: 6px solid var(--sport-purple);
            border-bottom: 6px solid var(--sport-yellow);
            border-radius: 15px;
            background: white;
            width: 100%;
            max-width: 450px;
        }

        .btn-register {
            background-color: var(--sport-purple);
            color: white;
            font-weight: bold;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            background-color: #59359a;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(111, 66, 193, 0.3);
        }

        .logo-img {
            max-width: 110px;
            height: auto;
        }

        .text-purple { color: var(--sport-purple); }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="card card-register shadow-lg p-4 p-md-5">
            
            <div class="text-center mb-4">
                <img src="../assets/logoSportClub.png" alt="SportClub Logo" class="logo-img mb-2" onerror="this.src='https://via.placeholder.com/120x60?text=SportClub'">
                <h2 class="fw-bold text-purple" style="letter-spacing: -1px;">CREAR CUENTA</h2>
                <p class="text-muted small">Únete a la comunidad SportClub</p>
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold">NOMBRE COMPLETO</label>
                    <input type="text" id="regName" class="form-control" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">CORREO ELECTRÓNICO</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="nombre@demo.cl" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">CONTRASEÑA</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="Mínimo 8 caracteres" required minlength="8">
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">TIPO DE USUARIO</label>
                    <select id="regRole" class="form-select">
                        <option value="user" selected>Socio (Deportista)</option>
                        <option value="coach">Entrenador (Coach)</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-register w-100 py-2 mb-3">
                    REGISTRARME AHORA
                </button>
                
                <div id="registerMessage" class="alert d-none small p-2 text-center fw-bold"></div>

                <div class="text-center mt-3">
                    <span class="small text-muted">¿Ya tienes cuenta?</span>
                    <a href="login.html" class="small text-decoration-none fw-bold text-purple ms-1">Inicia Sesión</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>

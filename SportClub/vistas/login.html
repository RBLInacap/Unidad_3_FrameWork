<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sport-purple: #6f42c1; /* Morado de la pauta */
            --sport-yellow: #ffc107; /* Amarillo del Index */
            --sport-dark: #212529;
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Card con los colores del Index */
        .card-login {
            border: none;
            border-top: 6px solid var(--sport-purple);
            border-bottom: 6px solid var(--sport-yellow);
            border-radius: 15px;
            background: white;
        }

        .btn-login {
            background-color: var(--sport-purple);
            color: white;
            font-weight: bold;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: #59359a;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(111, 66, 193, 0.3);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-img {
            max-width: 130px;
            height: auto;
            /* Si no tienes logo real, esto evita que se vea mal */
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--sport-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-text {
            background-color: white;
            border-right: none;
        }

        .form-control {
            border-left: none;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        .text-purple { color: var(--sport-purple); }
        .text-yellow { color: var(--sport-yellow); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 20px;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <div class="card card-login shadow-lg p-4 p-md-5">
                    
                    <div class="logo-container">
                        <img src="../assets/logoSportClub.png" alt="SportClub Logo" class="logo-img mb-3" onerror="this.src='https://via.placeholder.com/150x60?text=SportClub'">
                        <h2 class="fw-bold m-0" style="letter-spacing: -1px;">BIENVENIDO</h2>
                        <p class="text-muted small">Ingresa tus credenciales de socio</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Correo Institucional</label>
                            <div class="input-group">
                                <span class="input-group-text">📧</span>
                                <input type="email" id="loginEmail" class="form-control" placeholder="usuario@demo.cl" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="loginPassword" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text">🔒</span>
                                <input type="password" id="loginPassword" class="form-control" placeholder="********" required>
                            </div>
                        </div>

                        <div id="loginMessage" class="alert d-none p-2 mb-3 small text-center"></div>

                        <button type="submit" class="btn btn-login w-100 py-2 mb-3 shadow-sm">
                            INICIAR SESIÓN
                        </button>

                        <div class="text-center mt-3">
                            <span class="small text-muted">¿Eres nuevo?</span>
                            <a href="registro.html" class="small text-decoration-none fw-bold text-purple ms-1">Regístrate aquí</a>
                        </div>
                    </form>
                </div>

                <div class="text-center mt-4">
                    <p class="text-muted" style="font-size: 0.75rem;">
                        &copy; 2026 SportClub La Serena - Inacap <br>
                        <span class="fw-bold" style="color: var(--sport-yellow);">Energía que te mueve</span>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
